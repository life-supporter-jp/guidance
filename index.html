<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ライフサポーターオンライン</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; background-color: #f9f9f9; }
        
        /* 全体の横幅を550pxに制限して中央寄せ */
        .wrap { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 20px; 
            box-sizing: border-box;
            min-height: 100vh;
        }

        .content-area { text-align: center; padding: 20px 0; }
        h2 { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        p { font-size: 18px; margin-bottom: 20px; }

        /* QRとボタンのサイズ調整 */
        .qrcode { margin: 20px auto; }
        .addfriend_btn { width: 100%; max-width: 300px; display: inline-block; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="content-area">
        <h2>ライフサポーターオンライン</h2>
        <p>便利ツール5選はラインから配布しています。</p>

        <p>2つのツールを追加しました。</p>
<p>１）「今どこ救Ｒ」<br>
    QRコード無料作成、人、子供、物、ペットが行方不明になった時に、見つけてくれた人が指定した人に直接連絡します。
</p>
        <p>２）「お元気ですかメール」<br>
            単身でも安心見守りサービスから３０日体験版（家族用）が無料で利用できます。</p>
        
        <p style="font-weight: bold;">
            以下のライン友だちから登録ください。<br>
            ライフサポーターに入りましたら<br>
            下部のツールから5個のアプリをご利用ください。
        </p>

        <div class="qrcode" style="display: inline-block;"></div>

        <div style="margin-top: 20px;">
            <a href="https://g0qiltvg.autosns.app/line" class="addfriend_href">
                <img class="addfriend_btn" src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png" alt="LINE友だち追加">
            </a>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://autosns.jp/js/zbp/jquery.qrcode.min.js"></script>
<script src="https://g0qiltvg.autosns.app/copy-qr/js?height=200&show=1"></script>

<script>
    window.addEventListener("load", function() {
        let url = new URL(window.location.href);
        let get_params = {};
        for(entry of url.searchParams) { get_params[entry[0]] = entry[1]; }
        get_params['partner_id'] = "A8ildpNc2q";
        for(key in get_params) { 
            let span = document.createElement('span');
            span.className = 'proline-copy-qr-get-params';
            span.setAttribute('data-key', key);
            span.setAttribute('data-value', get_params[key]);
            document.body.appendChild(span);
        }
    });
</script>

</body>
</html>
