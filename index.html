    <p style="font-weight: bold; margin-bottom: 20px;">以下のライン友だちから登録ください<br>
    ライフサポーターに入りましたら<br>
    下部のツールから5個のアプリをご利用ください</p>

    <div class="qrcode" style="display: inline-block; margin: 10px 0;"></div>

        <a href="https://g0qiltvg.autosns.app/line" class="addfriend_href">
            <img width="300" src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png" alt="LINE友だち追加">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://autosns.jp/js/zbp/jquery.qrcode.min.js"></script>
<script src="https://g0qiltvg.autosns.app/copy-qr/js?height=200&show=1"></script>

<script>
    window.addEventListener("load", function() {
        let url = new URL(window.location.href);
        let get_params = {};
        for(entry of url.searchParams) {
            get_params[entry[0]] = entry[1];
        }
        get_params['content_element_lp_id'] = "";
        get_params['scenario_id'] = "";
        get_params['partner_id'] = "A8ildpNc2q";
        
        for(key in get_params) { 
            let span = document.createElement('span');
            let element_id = `proline-copy-qr-get-params-${key}`;
            span.className = 'proline-copy-qr-get-params';
            span.setAttribute('data-key', key);
            span.setAttribute('data-value', get_params[key]);
            span.setAttribute('id', element_id);
            let old_element = document.querySelector(`#${element_id}`);
            if(old_element) {
                old_element.remove();
            }
            document.body.appendChild(span);
        }
    });
</script>
